<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>tesla-counter · dashboard</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  :root {
    --bg:#0b1220; --panel:#0f172a; --border:#1e293b; --text:#e2e8f0;
    --dim:#64748b; --accent:#34d399; --warn:#fbbf24; --err:#f87171; --info:#38bdf8;
  }
  * { box-sizing:border-box }
  body {
    margin:0; padding:24px; background:var(--bg); color:var(--text);
    font:14px/1.5 -apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC",sans-serif;
    min-height:100vh;
  }
  h1 { font-size:18px; margin:0 0 4px; font-weight:600 }
  .sub { color:var(--dim); font-size:12px; margin-bottom:20px }
  .sub code { font-family:ui-monospace,Menlo,Consolas,monospace; color:#94a3b8 }
  .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:16px }
  .card {
    background:var(--panel); border:1px solid var(--border); border-radius:12px;
    padding:16px 20px;
  }
  .card h2 { font-size:11px; letter-spacing:2px; color:var(--dim); margin:0 0 12px; font-weight:700 }
  .big { font-size:42px; font-weight:700; font-family:ui-monospace,Menlo,Consolas,monospace; line-height:1.1 }
  .big.today { color:var(--accent) }
  .big.yesterday { color:var(--info) }
  .big .unit { font-size:14px; color:var(--dim); margin-left:6px; font-weight:400 }
  .row { display:flex; justify-content:space-between; align-items:center; gap:10px; padding:5px 0; font-size:13px }
  .row + .row { border-top:1px dashed #1e293b }
  .row .k { color:#cbd5e1; font-family:ui-monospace,Menlo,Consolas,monospace; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:1; min-width:0 }
  .row .v { color:var(--dim); font-family:ui-monospace,Menlo,Consolas,monospace; font-size:12px; white-space:nowrap }
  .bar { flex:2; min-width:80px; height:6px; background:#1e293b; border-radius:3px; overflow:hidden; position:relative }
  .bar > span { display:block; height:100%; background:linear-gradient(90deg,#0ea5e9,#34d399); border-radius:3px; transition:width .4s ease }
  .card.version .bar > span { background:linear-gradient(90deg,#6366f1,#a78bfa) }
  .card.country .bar > span { background:linear-gradient(90deg,#f59e0b,#f87171) }
  .empty { color:var(--dim); font-size:12px; padding:4px 0 }
  footer { margin-top:24px; color:var(--dim); font-size:11px; text-align:center }
  footer button {
    background:var(--border); color:var(--text); border:none; border-radius:6px;
    padding:4px 10px; font-size:11px; cursor:pointer; margin-left:8px
  }
  footer button:hover { background:#334155 }
  .err { color:var(--err) }
  .pulse { display:inline-block; width:6px; height:6px; border-radius:50%; background:var(--accent); margin-right:6px; animation:pulse 2s infinite }
  @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:.3 } }
</style>
</head>
<body>
  <h1><span class="pulse"></span>tesla-counter 仪表盘</h1>
  <div class="sub">
    数据源：<code id="srcUrl">…</code> · 自动刷新 60s
    <span id="errBox" class="err" style="display:none;margin-left:8px"></span>
  </div>

  <div class="grid">
    <div class="card"><h2>今日</h2><div class="big today"><span id="today">—</span><span class="unit">台</span></div></div>
    <div class="card"><h2>昨日</h2><div class="big yesterday"><span id="yesterday">—</span><span class="unit">台</span></div></div>
    <div class="card"><h2>日期 (UTC)</h2><div class="big" style="font-size:24px;margin-top:14px"><span id="date">—</span></div></div>
  </div>

  <div class="grid" style="margin-top:16px">
    <div class="card">
      <h2>按硬件变体</h2>
      <div id="envList" class="empty">—</div>
    </div>
    <div class="card version">
      <h2>按固件版本</h2>
      <div id="verList" class="empty">—</div>
    </div>
    <div class="card country">
      <h2>按国家</h2>
      <div id="ctyList" class="empty">—</div>
    </div>
  </div>

  <footer>
    最后刷新：<span id="lastUpdate">—</span>
    <button onclick="load()">手动刷新</button>
  </footer>

<script>
const ENDPOINT = localStorage.getItem('teslaCounterEndpoint') ||
  'https://tesla-counter.bswlhbhmt.workers.dev';
document.getElementById('srcUrl').textContent = ENDPOINT + '/stats';

function renderBars(containerId, obj) {
  const el = document.getElementById(containerId);
  const entries = Object.entries(obj || {}).sort((a,b) => b[1] - a[1]);
  if (!entries.length) { el.className = 'empty'; el.textContent = '暂无数据'; return; }
  el.className = '';
  const max = entries[0][1];
  el.innerHTML = entries.map(([k,v]) => {
    const pct = Math.max(4, Math.round(v / max * 100));
    return `<div class="row">
      <span class="k" title="${escapeHtml(k)}">${escapeHtml(k)}</span>
      <span class="bar"><span style="width:${pct}%"></span></span>
      <span class="v">${v}</span>
    </div>`;
  }).join('');
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

async function load() {
  const errBox = document.getElementById('errBox');
  errBox.style.display = 'none';
  try {
    const r = await fetch(ENDPOINT + '/stats', {cache:'no-store'});
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const d = await r.json();
    document.getElementById('today').textContent = d.today ?? '—';
    document.getElementById('yesterday').textContent = d.yesterday ?? '—';
    document.getElementById('date').textContent = d.date ?? '—';
    renderBars('envList', d.byEnv);
    renderBars('verList', d.byVersion);
    renderBars('ctyList', d.byCountry);
    document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString('zh-CN');
  } catch (e) {
    errBox.style.display = '';
    errBox.textContent = '✗ ' + e.message;
  }
}

load();
setInterval(load, 60000);
</script>
</body>
</html>
