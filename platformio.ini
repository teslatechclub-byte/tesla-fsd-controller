[env:esp32]
platform = espressif32
board = esp32dev
framework = arduino
lib_deps =
    https://github.com/ESP32Async/ESPAsyncWebServer.git
    https://github.com/ESP32Async/AsyncTCP.git
build_flags =
    -DTWAI_TX_PIN=5
    -DTWAI_RX_PIN=4
    -DCORE_DEBUG_LEVEL=0
monitor_speed = 115200
board_build.partitions = min_spiffs.csv
extra_scripts = pre:compress_html.py, post:merge_firmware.py

; ── Debug builds (local testing only — do NOT release) ──────────────────────
[env:esp32-debug]
platform = espressif32
board = esp32dev
framework = arduino
lib_deps =
    https://github.com/ESP32Async/ESPAsyncWebServer.git
    https://github.com/ESP32Async/AsyncTCP.git
build_flags =
    -DTWAI_TX_PIN=5
    -DTWAI_RX_PIN=4
    -DDEBUG_MODE
monitor_speed = 115200
board_build.partitions = min_spiffs.csv
extra_scripts = pre:compress_html.py, post:merge_firmware.py

; ── Waveshare ESP32-S3-RS485-CAN — TWAI only ──────────────────────────────
; CAN TX = GPIO15, CAN RX = GPIO16
[env:esp32s3-waveshare]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
lib_deps =
    https://github.com/ESP32Async/ESPAsyncWebServer.git
    https://github.com/ESP32Async/AsyncTCP.git
build_flags =
    -DTWAI_TX_PIN=15
    -DTWAI_RX_PIN=16
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=0
monitor_speed = 115200
board_build.partitions = min_spiffs.csv
extra_scripts = pre:compress_html.py, post:merge_firmware.py

