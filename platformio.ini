; ── Waveshare ESP32-S3 + WiFi Bridge (hybrid arduino+espidf) ────────────────
; 手机热点 → ESP32 STA → ESP32 AP → 车机
; 支持 DNS 白名单/黑名单、NAPT 转发、温度降频
; 基于 pudge9527/tesla-fsd-wifi-controller pudge-new 分支
[env:esp32s3-waveshare-wifi]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino, espidf
lib_deps =
    https://github.com/ESP32Async/ESPAsyncWebServer.git
    https://github.com/ESP32Async/AsyncTCP.git
build_flags =
    -I include
    -DTWAI_TX_PIN=15
    -DTWAI_RX_PIN=16
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DWIFI_BRIDGE_ENABLED
    -DCORE_DEBUG_LEVEL=0
    -DESP_IDF_LWIP_HOOK_FILENAME=\"lwip_hooks.h\"
    -Wno-error=return-type
build_unflags = -Werror=return-type
monitor_speed = 115200
board_build.partitions = min_spiffs.csv
board_build.sdkconfig_defaults = sdkconfig.defaults
extra_scripts = pre:compress_html.py, post:merge_firmware.py
