; ── Waveshare ESP32-S3 + MCP2517FD ×2 — 三路 CAN ────────────────────────────
; TWAI: TX=GPIO15, RX=GPIO16
; Dual CAN (MCP2517FD × 2 via SPI):
;   Shared SPI: SCK=12, MISO=13, MOSI=11
;   Module 1 (Vehicle CAN, VH pins 9/10):  CS=10, INT=14
;   Module 2 (Chassis/PRTY CAN, pins 2/3): CS=8,  INT=9
[env:esp32s3-waveshare-dual]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
lib_deps =
    https://github.com/me-no-dev/ESPAsyncWebServer.git
    https://github.com/me-no-dev/AsyncTCP.git
    pierremolinaro/ACAN2517
build_flags =
    -DTWAI_TX_PIN=15
    -DTWAI_RX_PIN=16
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DDUAL_CAN_ENABLED
    -DCORE_DEBUG_LEVEL=0
    -DMCP2517FD_OSC_HZ=20000000UL
    -DMCP_SCK=12
    -DMCP_MISO=13
    -DMCP_MOSI=11
    -DMCP_CS1=10
    -DMCP_INT1=14
    -DMCP_CS2=8
    -DMCP_INT2=9
monitor_speed = 115200
board_build.partitions = min_spiffs.csv
extra_scripts = pre:compress_html.py, post:merge_firmware.py

