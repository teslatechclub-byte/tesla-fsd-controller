<svg width="860" height="420" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue', Arial, sans-serif">
  <!-- Background -->
  <rect width="860" height="420" fill="#0d1117" rx="12"/>

  <!-- Title -->
  <text x="430" y="38" text-anchor="middle" fill="#e6edf3" font-size="17" font-weight="bold">接线图 — Waveshare ESP32-S3-RS485-CAN → Tesla CAN Bus</text>

  <!-- ════════════════ Power Source (Fuse Box) ════════════════ -->
  <rect x="20" y="120" width="140" height="120" rx="10" fill="#161b22" stroke="#f85149" stroke-width="2"/>
  <text x="90" y="145" text-anchor="middle" fill="#e6edf3" font-size="12" font-weight="bold">车内电源</text>
  <text x="90" y="160" text-anchor="middle" fill="#8b949e" font-size="10">保险丝盒 ACC 路</text>
  <text x="90" y="174" text-anchor="middle" fill="#8b949e" font-size="10">或手套箱 12V</text>
  <text x="90" y="188" text-anchor="middle" fill="#6e7681" font-size="9">或 USB-C 5V 供电</text>
  <!-- 12V output pin -->
  <rect x="154" y="158" width="14" height="14" rx="2" fill="#f85149"/>
  <text x="150" y="171" text-anchor="end" fill="#f85149" font-size="11" font-weight="bold">12V</text>
  <!-- GND output pin -->
  <rect x="154" y="198" width="14" height="14" rx="2" fill="#8b949e"/>
  <text x="150" y="211" text-anchor="end" fill="#8b949e" font-size="11" font-weight="bold">GND</text>

  <!-- ════════════════ Waveshare Board ════════════════ -->
  <rect x="280" y="65" width="300" height="290" rx="10" fill="#161b22" stroke="#388bfd" stroke-width="2.5"/>
  <!-- Board face detail -->
  <rect x="305" y="105" width="250" height="210" rx="6" fill="#0d1117" stroke="#21262d" stroke-width="1"/>
  <!-- Chip box -->
  <rect x="355" y="150" width="150" height="80" rx="5" fill="#21262d" stroke="#388bfd" stroke-width="1.5"/>
  <text x="430" y="184" text-anchor="middle" fill="#79c0ff" font-size="12" font-weight="bold">ESP32-S3</text>
  <text x="430" y="200" text-anchor="middle" fill="#6e7681" font-size="9">WiFi / CAN (TWAI)</text>
  <!-- LED dots -->
  <circle cx="330" cy="120" r="5" fill="#3fb950" opacity="0.8"/>
  <circle cx="348" cy="120" r="5" fill="#f85149" opacity="0.8"/>
  <text x="362" y="124" fill="#6e7681" font-size="8">PWR / STATUS</text>
  <!-- Label -->
  <text x="430" y="90" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="bold">Waveshare ESP32-S3-RS485-CAN</text>
  <!-- Advantage badge -->
  <rect x="320" y="280" width="220" height="52" rx="4" fill="#1f2937" stroke="#3fb950" stroke-width="1"/>
  <text x="430" y="297" text-anchor="middle" fill="#3fb950" font-size="9" font-weight="bold">✓ 无需 SN65HVD230 模块</text>
  <text x="430" y="311" text-anchor="middle" fill="#6e7681" font-size="9">CAN 收发器已集成 (TJA1051T)</text>
  <text x="430" y="325" text-anchor="middle" fill="#6e7681" font-size="9">120Ω 终端电阻默认断开，无需处理</text>

  <!-- Left terminal block (power input) -->
  <rect x="276" y="158" width="14" height="14" rx="2" fill="#f85149"/>
  <text x="292" y="171" fill="#f85149" font-size="11" font-weight="bold">VCC+</text>
  <text x="292" y="184" fill="#6e7681" font-size="9">7–36V DC</text>
  <rect x="276" y="198" width="14" height="14" rx="2" fill="#8b949e"/>
  <text x="292" y="211" fill="#8b949e" font-size="11" font-weight="bold">GND</text>

  <!-- Right terminal block (CAN output) -->
  <rect x="570" y="198" width="14" height="14" rx="2" fill="#e3b341"/>
  <text x="566" y="211" text-anchor="end" fill="#e3b341" font-size="11" font-weight="bold">CAN-H</text>
  <rect x="570" y="238" width="14" height="14" rx="2" fill="#bc8cff"/>
  <text x="566" y="251" text-anchor="end" fill="#bc8cff" font-size="11" font-weight="bold">CAN-L</text>

  <!-- USB note -->
  <rect x="308" y="336" width="244" height="22" rx="3" fill="#21262d"/>
  <text x="430" y="348" text-anchor="middle" fill="#6e7681" font-size="9">Type-C USB：可用于烧录固件</text>
  <text x="430" y="361" text-anchor="middle" fill="#6e7681" font-size="9">或车内 5V 供电（无需接螺丝端子电源）</text>

  <!-- ════════════════ Wires power source → board ════════════════ -->
  <!-- 12V red -->
  <polyline points="168,165 240,165 240,165 276,165" fill="none" stroke="#f85149" stroke-width="2.5"/>
  <!-- GND gray -->
  <polyline points="168,205 240,205 240,205 276,205" fill="none" stroke="#8b949e" stroke-width="2.5"/>

  <!-- ════════════════ Wires board → Tesla connector ════════════════ -->
  <!-- CAN-H yellow -->
  <polyline points="584,205 630,205 630,230 685,230" fill="none" stroke="#e3b341" stroke-width="2.5"/>
  <text x="612" y="200" fill="#e3b341" font-size="10" font-weight="bold">CAN-H</text>
  <!-- CAN-L purple -->
  <polyline points="584,245 630,245 630,262 685,262" fill="none" stroke="#bc8cff" stroke-width="2.5"/>
  <text x="612" y="262" fill="#bc8cff" font-size="10" font-weight="bold">CAN-L</text>

  <!-- ════════════════ Tesla CAN Connector ════════════════ -->
  <rect x="660" y="165" width="185" height="155" rx="10" fill="#161b22" stroke="#3fb950" stroke-width="2"/>
  <rect x="675" y="210" width="135" height="70" rx="6" fill="#21262d" stroke="#30363d" stroke-width="1.5"/>
  <!-- Pin holes -->
  <circle cx="695" cy="230" r="5" fill="#30363d" stroke="#e3b341" stroke-width="1.5"/>
  <text x="706" y="234" fill="#8b949e" font-size="9">Pin 13 CAN-H</text>
  <circle cx="695" cy="262" r="5" fill="#30363d" stroke="#bc8cff" stroke-width="1.5"/>
  <text x="706" y="266" fill="#8b949e" font-size="9">Pin 14 CAN-L</text>
  <!-- Label -->
  <text x="748" y="188" text-anchor="middle" fill="#e6edf3" font-size="12" font-weight="bold">Tesla X179</text>
  <text x="748" y="202" text-anchor="middle" fill="#8b949e" font-size="9">（Model 3/Y 2021+）</text>

  <!-- ════════════════ Legend ════════════════ -->
  <rect x="20" y="385" width="820" height="22" rx="4" fill="#161b22"/>
  <circle cx="40" cy="396" r="4" fill="#f85149"/>
  <text x="48" y="400" fill="#f85149" font-size="10">车辆 12V 电源</text>
  <circle cx="150" cy="396" r="4" fill="#8b949e"/>
  <text x="158" y="400" fill="#8b949e" font-size="10">地线 GND</text>
  <circle cx="240" cy="396" r="4" fill="#e3b341"/>
  <text x="248" y="400" fill="#e3b341" font-size="10">CAN-H 总线</text>
  <circle cx="340" cy="396" r="4" fill="#bc8cff"/>
  <text x="348" y="400" fill="#bc8cff" font-size="10">CAN-L 总线</text>
  <text x="500" y="400" fill="#6e7681" font-size="10">总共 4 根线：2 根电源线 + 2 根 CAN 线（接螺丝端子，无需杜邦线）</text>
</svg>
